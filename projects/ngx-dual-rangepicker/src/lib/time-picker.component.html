<div class="drp-time-picker">
  <div class="drp-time-title">{{ intl.timeLabel }}</div>

  <div class="drp-time-controls">
    <mat-form-field appearance="outline" subscriptSizing="dynamic" class="drp-time-field">
      <mat-label>{{ intl.startTimeLabel }}</mat-label>
      <input
        matInput
        type="text"
        inputmode="numeric"
        maxlength="5"
        placeholder="00:00"
        [value]="startTimeDisplay()"
        (input)="onStartTimeInput($any($event.target).value)"
        (blur)="onStartTimeBlur()"
        [attr.aria-label]="intl.startTimeLabel"
      />
      @if (startError()) {
        <mat-error>{{ startError() }}</mat-error>
      }
    </mat-form-field>

    <span class="drp-time-separator" aria-hidden="true">&ndash;</span>

    <mat-form-field appearance="outline" subscriptSizing="dynamic" class="drp-time-field">
      <mat-label>{{ intl.endTimeLabel }}</mat-label>
      <input
        matInput
        type="text"
        inputmode="numeric"
        maxlength="5"
        placeholder="23:59"
        [value]="endTimeDisplay()"
        (input)="onEndTimeInput($any($event.target).value)"
        (blur)="onEndTimeBlur()"
        [attr.aria-label]="intl.endTimeLabel"
      />
      @if (endError()) {
        <mat-error>{{ endError() }}</mat-error>
      }
    </mat-form-field>
  </div>
</div>
