<div class="drp-year-range-view" [class.drp-vertical]="vertical()">
  <!-- Left panel -->
  <div class="drp-year-panel">
    <div class="drp-year-panel-header">
      <button class="drp-nav-btn" type="button" (click)="prevLeftPage()" aria-label="Previous years">&#8249;</button>
      <span class="drp-panel-range-label">{{ leftPageLabel() }}</span>
      <button class="drp-nav-btn" type="button" (click)="nextLeftPage()" aria-label="Next years">&#8250;</button>
    </div>
    <div class="drp-year-grid" role="grid" aria-label="Select start or end year">
      @for (row of leftRows(); track $index) {
        <div class="drp-year-row" role="row">
          @for (cell of row; track cell.year) {
            <button
              class="drp-year-cell"
              [class.drp-range-start]="getCellState(cell) === 'range-start'"
              [class.drp-range-end]="getCellState(cell) === 'range-end'"
              [class.drp-in-range]="getCellState(cell) === 'in-range'"
              [class.drp-preview]="getCellState(cell) === 'preview'"
              [disabled]="cell.disabled"
              [attr.aria-selected]="getCellState(cell) === 'range-start' || getCellState(cell) === 'range-end'"
              [attr.aria-disabled]="cell.disabled"
              role="gridcell"
              type="button"
              (click)="onCellClick(cell)"
              (mouseenter)="onCellHover(cell)"
              (mouseleave)="onCellHover(null)"
            >
              {{ cell.year }}
            </button>
          }
        </div>
      }
    </div>
  </div>

  <!-- Right panel -->
  <div class="drp-year-panel">
    <div class="drp-year-panel-header">
      <button class="drp-nav-btn" type="button" (click)="prevRightPage()" aria-label="Previous years">&#8249;</button>
      <span class="drp-panel-range-label">{{ rightPageLabel() }}</span>
      <button class="drp-nav-btn" type="button" (click)="nextRightPage()" aria-label="Next years">&#8250;</button>
    </div>
    <div class="drp-year-grid" role="grid" aria-label="Select start or end year">
      @for (row of rightRows(); track $index) {
        <div class="drp-year-row" role="row">
          @for (cell of row; track cell.year) {
            <button
              class="drp-year-cell"
              [class.drp-range-start]="getCellState(cell) === 'range-start'"
              [class.drp-range-end]="getCellState(cell) === 'range-end'"
              [class.drp-in-range]="getCellState(cell) === 'in-range'"
              [class.drp-preview]="getCellState(cell) === 'preview'"
              [disabled]="cell.disabled"
              [attr.aria-selected]="getCellState(cell) === 'range-start' || getCellState(cell) === 'range-end'"
              [attr.aria-disabled]="cell.disabled"
              role="gridcell"
              type="button"
              (click)="onCellClick(cell)"
              (mouseenter)="onCellHover(cell)"
              (mouseleave)="onCellHover(null)"
            >
              {{ cell.year }}
            </button>
          }
        </div>
      }
    </div>
  </div>
</div>
