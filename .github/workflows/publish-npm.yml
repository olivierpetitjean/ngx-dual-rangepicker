name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Check tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./projects/ngx-dual-rangepicker/package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "❌ Tag $GITHUB_REF_NAME does not match package.json version ($PKG)"
            exit 1
          fi
          echo "✅ Version $PKG matches tag"

      - run: npm ci

      - run: npx ng build ngx-dual-rangepicker --configuration=production

      - run: npm publish
        working-directory: build/ngx-dual-rangepicker
