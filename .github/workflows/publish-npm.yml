name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - run: npx ng build ngx-dual-rangepicker --configuration=production

      - run: npm publish
        working-directory: build/ngx-dual-rangepicker
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
